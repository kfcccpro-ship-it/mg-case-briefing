<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>새마을금고 이사장님을 위한 판례 브리핑</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

:root {
  --blue:        #3182F6;
  --blue-dark:   #1B64DA;
  --blue-light:  #EBF3FE;
  --green:       #05C072;
  --green-light: #E6FBF1;
  --amber:       #F59E0B;
  --amber-light: #FFFBEB;
  --gray-50:  #F9FAFB;
  --gray-100: #F2F4F6;
  --border:   #E5E8EB;
  --t1: #191F28;
  --t2: #4E5968;
  --t3: #8B95A1;
  --radius: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.06);

  /* 글자 크기 — JS로 변경 */
  --fs-xs:   13px;
  --fs-sm:   15px;
  --fs-base: 18px;
  --fs-md:   21px;
  --fs-lg:   24px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background: var(--gray-50);
  color: var(--t1);
  font-size: var(--fs-base);
  -webkit-font-smoothing: antialiased;
}

/* ── 헤더 ── */
.hdr {
  position: sticky; top: 0; z-index: 100;
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.hdr-left { display: flex; align-items: center; gap: 10px; flex: 1; }
.hdr-icon {
  width: 40px; height: 40px; flex-shrink: 0;
  background: var(--blue); border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.hdr-title { font-size: 15px; font-weight: 800; line-height: 1.35; }
.hdr-credit { font-size: 11px; color: var(--t3); margin-top: 2px; }

/* 글자 크기 버튼 */
.fctr {
  display: flex; align-items: center; gap: 3px;
  background: var(--gray-100); border-radius: 8px; padding: 4px 6px;
  flex-shrink: 0;
}
.fbtn {
  border: none; background: transparent; cursor: pointer;
  color: var(--t2); padding: 4px 8px; border-radius: 6px;
  font-family: inherit; font-weight: 700; line-height: 1;
  transition: background .15s, color .15s;
}
.fbtn.sm { font-size: 12px; }
.fbtn.lg { font-size: 17px; }
.fbtn.on { background: #fff; color: var(--blue); box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.fdiv { width: 1px; height: 16px; background: var(--border); }

/* ── 탭바 ── */
.tabbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; z-index: 100;
  background: #fff; border-top: 1px solid var(--border);
  display: flex; height: 58px;
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  border: none; background: transparent; cursor: pointer;
  font-family: inherit; color: var(--t3); transition: color .15s;
}
.tab.on { color: var(--blue); }
.tab-ico { font-size: 22px; line-height: 1; }
.tab-lbl { font-size: 11px; font-weight: 600; }

/* ── 공통 컨테이너 ── */
.wrap {
  max-width: 480px; margin: 0 auto;
  padding: 16px 16px 80px;
}

/* ── 로딩 ── */
#pg-loading {
  display: none;
  min-height: calc(100vh - 70px);
  max-width: 480px; margin: 0 auto;
  flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 20px; text-align: center;
}
.ring-wrap { position: relative; width: 72px; height: 72px; margin-bottom: 24px; }
.ring {
  position: absolute; inset: 0;
  border: 5px solid var(--gray-100); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 1s linear infinite;
}
.ring-ico { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
@keyframes spin { to { transform: rotate(360deg); } }
.ld-title { font-size: var(--fs-lg); font-weight: 700; margin-bottom: 8px; }
.ld-sub   { font-size: var(--fs-sm); color: var(--t2); line-height: 1.8; }
.ld-steps { margin-top: 28px; width: 100%; max-width: 300px; text-align: left; }
.ls {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  font-size: var(--fs-sm); color: var(--t3); transition: color .4s;
}
.ls:last-child { border-bottom: none; }
.ls.on { color: var(--blue); font-weight: 600; }
.ls.ok { color: var(--t3); }
.ls-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background .4s; }
.ls.on .ls-dot { background: var(--blue); }
.ls.ok .ls-dot { background: var(--green); }

/* ── 결과 화면 ── */
#pg-today  { display: none; }
#pg-history { display: none; }

/* 날짜 뱃지 */
.d-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--blue-light); color: var(--blue);
  padding: 6px 14px; border-radius: 20px;
  font-size: var(--fs-sm); font-weight: 600; margin-bottom: 14px;
}

/* 판례 타이틀 카드 */
.title-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.tc-label { font-size: var(--fs-xs); color: var(--t3); font-weight: 600; margin-bottom: 6px; }
.tc-name  { font-size: var(--fs-md); font-weight: 700; line-height: 1.4; margin-bottom: 14px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 12px; background: var(--gray-100);
  border-radius: 20px; font-size: 13px; color: var(--t2); font-weight: 500;
}
.chip.blue  { background: var(--blue-light);  color: var(--blue);  }
.chip.green { background: var(--green-light); color: #059b5c; }

/* 쉽게 말하면 카드 */
.hook-card {
  background: var(--blue); color: #fff;
  border-radius: var(--radius); padding: 24px;
  margin-bottom: 12px; position: relative; overflow: hidden;
}
.hook-card::after {
  content: '💬'; position: absolute; right: 16px; bottom: -6px;
  font-size: 64px; opacity: .12;
}
.hook-kw   { font-size: var(--fs-xs); opacity: .8; letter-spacing: 1px; font-weight: 700; margin-bottom: 8px; }
.hook-body { font-size: var(--fs-md); line-height: 1.9; }

/* 일반 섹션 카드 */
.card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.card-hd {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.card-ico {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.card-ico.blue  { background: var(--blue-light); }
.card-ico.green { background: var(--green-light); }
.card-ico.amber { background: var(--amber-light); }
.card-ttl { font-size: var(--fs-base); font-weight: 700; }

/* 개조식 */
.bullets { display: flex; flex-direction: column; gap: 10px; }
.brow    { display: flex; gap: 10px; align-items: flex-start; }
.barrow  {
  min-width: 22px; height: 22px; background: var(--blue-light); color: var(--blue);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; flex-shrink: 0; margin-top: 3px;
}
.btxt { font-size: var(--fs-base); line-height: 1.8; flex: 1; }

/* 판결 결과 */
.verdict {
  background: var(--green-light);
  border-left: 4px solid var(--green);
  border-radius: 0 10px 10px 0;
  padding: 16px 18px;
  font-size: var(--fs-base); line-height: 1.9;
}

/* 실무 포인트 */
.points { display: flex; flex-direction: column; gap: 14px; }
.prow   { display: flex; gap: 12px; align-items: flex-start; }
.pnum   {
  min-width: 28px; height: 28px; background: var(--blue); color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.ptxt { font-size: var(--fs-base); line-height: 1.8; flex: 1; }

/* 버튼들 */
.btn-share {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 18px; background: #FEE500; color: var(--t1);
  border: none; border-radius: 10px; font-size: var(--fs-base); font-weight: 700;
  font-family: inherit; cursor: pointer; margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(254,229,0,.4);
}
.btn-more {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 16px; background: #fff; color: var(--t2);
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: var(--fs-base); font-weight: 600; font-family: inherit; cursor: pointer;
  transition: border-color .15s, color .15s;
}
.btn-more:hover { border-color: var(--blue); color: var(--blue); }

/* 캐시 알림 */
.cache-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-light); color: var(--blue);
  padding: 10px 14px; border-radius: 10px;
  font-size: 13px; margin-bottom: 14px;
}

/* 에러 카드 */
.err-card {
  background: #fff; border-radius: var(--radius);
  padding: 40px 24px; text-align: center; box-shadow: var(--shadow);
}
.err-ico   { font-size: 48px; margin-bottom: 14px; }
.err-ttl   { font-size: var(--fs-lg); font-weight: 700; margin-bottom: 10px; }
.err-msg   { font-size: var(--fs-sm); color: var(--t2); line-height: 1.8; margin-bottom: 22px; }
.btn-retry {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 28px; background: var(--blue); color: #fff;
  border: none; border-radius: 10px;
  font-size: var(--fs-base); font-weight: 700; font-family: inherit; cursor: pointer;
}

/* 히스토리 */
.hist-count { font-size: var(--fs-sm); color: var(--t3); margin-bottom: 12px; }
.hist-list  { display: flex; flex-direction: column; gap: 10px; }
.hist-item {
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow);
}
.hist-item:hover { border-color: var(--blue); }
.hist-ico  { width: 42px; height: 42px; background: var(--blue-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.hist-info { flex: 1; min-width: 0; }
.hist-date { font-size: 13px; color: var(--t3); margin-bottom: 3px; }
.hist-name { font-size: var(--fs-sm); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-cat  { font-size: 12px; background: var(--blue-light); color: var(--blue); padding: 3px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.hist-today{ font-size: 12px; background: var(--green); color: #fff; padding: 3px 10px; border-radius: 20px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.hist-empty { text-align: center; padding: 60px 20px; }
.hist-empty-ico { font-size: 48px; margin-bottom: 14px; }
.hist-empty-msg { font-size: var(--fs-base); color: var(--t3); line-height: 1.8; }
.back-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; font-family: inherit;
  font-size: var(--fs-sm); color: var(--blue); cursor: pointer;
  padding: 4px 0; margin-bottom: 16px; font-weight: 600;
}

/* 토스트 */
.toast {
  position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
  background: var(--t1); color: #fff; padding: 12px 22px;
  border-radius: 24px; font-size: var(--fs-sm); font-weight: 600;
  z-index: 999; opacity: 0; transition: opacity .3s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">⚖️</div>
    <div>
      <div class="hdr-title">새마을금고 이사장님을<br>위한 판례 브리핑</div>
      <div class="hdr-credit">작성자: 김진배 &nbsp;|&nbsp; 목적: 학습용</div>
    </div>
  </div>
  <div class="fctr">
    <button class="fbtn sm" id="btnSm" onclick="setFont('sm')">가</button>
    <div class="fdiv"></div>
    <button class="fbtn lg on" id="btnLg" onclick="setFont('lg')">가</button>
  </div>
</div>

<!-- 로딩 -->
<div id="pg-loading">
  <div class="ring-wrap">
    <div class="ring"></div>
    <div class="ring-ico">⚖️</div>
  </div>
  <div class="ld-title">오늘의 판례 준비 중</div>
  <div class="ld-sub">AI가 최신 판례를 분석해<br>이사장님께 맞게 정리하고 있습니다</div>
  <div class="ld-steps">
    <div class="ls" id="ls0"><span class="ls-dot"></span>금융기관 판례 검색 중</div>
    <div class="ls" id="ls1"><span class="ls-dot"></span>관련 판례 선별 중</div>
    <div class="ls" id="ls2"><span class="ls-dot"></span>이사장님 맞춤 정리 중</div>
    <div class="ls" id="ls3"><span class="ls-dot"></span>쉬운 말로 변환 중</div>
  </div>
</div>

<!-- 오늘 판례 -->
<div id="pg-today">
  <div class="wrap">
    <div id="cacheBar" class="cache-bar" style="display:none;">
      <span style="flex:1;">ℹ️ 오늘 이미 불러온 판례입니다</span>
      <button onclick="loadCase(true)" style="background:none;border:none;color:var(--blue);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">새로고침 🔄</button>
    </div>
    <div id="caseContent"></div>
  </div>
</div>

<!-- 지난 판례 -->
<div id="pg-history">
  <div class="wrap">
    <div id="histDetail" style="display:none;">
      <button class="back-btn" onclick="closeDetail()">← 목록으로</button>
      <div id="histDetailContent"></div>
    </div>
    <div id="histList">
      <div class="hist-count" id="histCount"></div>
      <div class="hist-list" id="histItems"></div>
    </div>
  </div>
</div>

<!-- 탭바 -->
<div class="tabbar" id="tabbar">
  <button class="tab on" id="tab-today" onclick="switchTab('today')">
    <span class="tab-ico">📋</span>
    <span class="tab-lbl">오늘 판례</span>
  </button>
  <button class="tab" id="tab-history" onclick="switchTab('history')">
    <span class="tab-ico">📚</span>
    <span class="tab-lbl">지난 판례</span>
  </button>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ═══ 설정 ═══ */
const API_KEY = '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';
const MODEL   = 'claude-haiku-4-5-20251001';

/* ═══ 날짜 ═══ */
const NOW      = new Date();
const TODAY_KEY = NOW.toISOString().slice(0, 10);
const TODAY_STR = NOW.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
const TODAY_LBL = NOW.toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'short' });

/* ═══ 상태 ═══ */
let currentCase = null;

/* ═══ 글자 크기 ═══ */
const FONTS = {
  sm: { 'fs-xs':'11px','fs-sm':'13px','fs-base':'16px','fs-md':'18px','fs-lg':'21px' },
  lg: { 'fs-xs':'13px','fs-sm':'15px','fs-base':'19px','fs-md':'22px','fs-lg':'26px' }
};
function setFont(size) {
  const r = document.documentElement;
  Object.entries(FONTS[size]).forEach(([k,v]) => r.style.setProperty('--'+k, v));
  document.getElementById('btnSm').classList.toggle('on', size === 'sm');
  document.getElementById('btnLg').classList.toggle('on', size === 'lg');
  try { localStorage.setItem('mg_font', size); } catch(e) {}
}
try { setFont(localStorage.getItem('mg_font') || 'lg'); } catch(e) { setFont('lg'); }

/* ═══ 화면 전환 ═══ */
function show(id) {
  document.getElementById('pg-loading').style.display  = 'none';
  document.getElementById('pg-today').style.display    = 'none';
  document.getElementById('pg-history').style.display  = 'none';
  if (id === 'loading') {
    document.getElementById('pg-loading').style.display = 'flex';
  } else {
    document.getElementById('pg-' + id).style.display = 'block';
  }
  window.scrollTo(0, 0);
}

function switchTab(tab) {
  show(tab);
  document.getElementById('tab-today').classList.toggle('on',   tab === 'today');
  document.getElementById('tab-history').classList.toggle('on', tab === 'history');
  if (tab === 'history') renderHistList();
}

/* ═══ 로딩 스텝 애니메이션 ═══ */
let stepTimer = null;
function startSteps() {
  ['ls0','ls1','ls2','ls3'].forEach(id => { document.getElementById(id).className = 'ls'; });
  document.getElementById('ls0').classList.add('on');
  let i = 0;
  if (stepTimer) clearInterval(stepTimer);
  stepTimer = setInterval(() => {
    if (i < 3) {
      document.getElementById('ls'+i).className = 'ls ok';
      document.getElementById('ls'+(i+1)).classList.add('on');
    }
    i++;
    if (i >= 4) clearInterval(stepTimer);
  }, 3000);
}

/* ═══ 캐시 유효성 ═══ */
function isValid(d) {
  return d &&
    typeof d.easy_summary === 'string' && d.easy_summary.length > 10 &&
    Array.isArray(d.summary_bullets) && d.summary_bullets.length > 0 &&
    typeof d.title === 'string' && d.title.length > 2 &&
    typeof d.verdict === 'string' && d.verdict.length > 10 &&
    Array.isArray(d.points) && d.points.length > 0;
}

/* ═══ 판례 불러오기 ═══ */
async function loadCase(force) {
  /* 캐시 확인 */
  if (!force) {
    try {
      const raw = localStorage.getItem('mg_' + TODAY_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (isValid(d)) { currentCase = d; renderCase(d, true); return; }
        else localStorage.removeItem('mg_' + TODAY_KEY);
      }
    } catch(e) { localStorage.removeItem('mg_' + TODAY_KEY); }
  }

  show('loading');
  startSteps();

  const prompt = `당신은 새마을금고(MG) 이사장님(60대 이상 CEO)을 위한 금융·법률 판례 브리핑 전문가입니다.
오늘 날짜: ${TODAY_STR}

【판례 선정 기준】
1. 대상 기관: 새마을금고(MG), 농협, 우리은행, 국민은행, 신한은행, 하나은행 중 하나 관련
2. 난이도: 60대 이상 CEO가 이해할 수 있는 일상적 사례
3. 유형 우선: 대출·보증 분쟁 / 직원 횡령·배임 / 이사장·임원 책임 / 고객 금전 분쟁 / 부동산 담보·경매
4. 오늘 날짜를 활용해 매번 다른 판례 선택
5. 실제 존재하는 판례만 사용

아래 JSON 형식으로만 응답하세요. JSON 외 텍스트 없이, 백틱 없이 순수 JSON만 반환하세요:

{
  "title": "사건 핵심을 담은 짧은 이름",
  "court": "법원명",
  "date": "선고일",
  "case_number": "사건번호",
  "category": "형사 또는 민사 또는 행정",
  "institution": "관련 기관명",
  "easy_summary": "60대 CEO도 단번에 이해할 수 있는 핵심 요약 2~3문장. 법률 용어 없이 일상 표현으로.",
  "summary_bullets": [
    "누가 무엇을 했는지 (한 줄)",
    "어떤 문제가 생겼는지 (한 줄)",
    "왜 소송까지 갔는지 (한 줄)",
    "추가 배경 (한 줄, 선택)"
  ],
  "verdict": "판결 결과 2~3문장. 누가 이겼는지, 형량·배상금 포함.",
  "points": [
    "이사장님이 실무에서 바로 쓸 수 있는 행동 지침 1",
    "행동 지침 2",
    "행동 지침 3"
  ]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (stepTimer) clearInterval(stepTimer);

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || '서버 오류 ' + res.status);
    }

    const data = await res.json();
    const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    const m = text.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('응답 파싱 실패');

    const d = JSON.parse(m[0]);
    d._date = TODAY_KEY;
    d._label = NOW.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });

    try { localStorage.setItem('mg_' + TODAY_KEY, JSON.stringify(d)); } catch(e) {}
    saveHist(d);
    currentCase = d;
    renderCase(d, false);

  } catch (err) {
    if (stepTimer) clearInterval(stepTimer);
    show('today');
    document.getElementById('caseContent').innerHTML = `
      <div class="err-card">
        <div class="err-ico">😥</div>
        <div class="err-ttl">판례를 불러오지 못했습니다</div>
        <div class="err-msg">${err.message}<br><br>잠시 후 다시 시도해 주세요.</div>
        <button class="btn-retry" onclick="loadCase(true)">🔄 다시 시도</button>
      </div>`;
    document.getElementById('cacheBar').style.display = 'none';
  }
}

/* ═══ 판례 렌더링 ═══ */
function buildCaseHTML(d) {
  const bullets = (d.summary_bullets || []).map(b => `
    <div class="brow">
      <div class="barrow">▶</div>
      <div class="btxt">${b}</div>
    </div>`).join('');

  const pts = (d.points || []).map((p, i) => `
    <div class="prow">
      <div class="pnum">${i+1}</div>
      <div class="ptxt">${p}</div>
    </div>`).join('');

  const lbl = d._label || TODAY_LBL;

  return `
    <div class="d-badge">📅 ${lbl} 판례</div>

    <div class="title-card">
      <div class="tc-label">⚖️ 오늘의 판례</div>
      <div class="tc-name">${d.title || ''}</div>
      <div class="chips">
        <span class="chip">🏛 ${d.court || ''}</span>
        <span class="chip">📅 ${d.date || ''}</span>
        <span class="chip blue">${d.category || ''}</span>
        ${d.institution ? `<span class="chip green">🏢 ${d.institution}</span>` : ''}
        <span class="chip" style="font-size:12px;">📎 ${d.case_number || ''}</span>
      </div>
    </div>

    <div class="hook-card">
      <div class="hook-kw">💬 쉽게 말하면?</div>
      <div class="hook-body">${(d.easy_summary || '').replace(/\n/g,'<br>')}</div>
    </div>

    <div class="card">
      <div class="card-hd">
        <div class="card-ico blue">📖</div>
        <div class="card-ttl">사건 개요</div>
      </div>
      <div class="bullets">${bullets}</div>
    </div>

    <div class="card">
      <div class="card-hd">
        <div class="card-ico green">⚖️</div>
        <div class="card-ttl">판결 결과</div>
      </div>
      <div class="verdict">${(d.verdict || '').replace(/\n/g,'<br>')}</div>
    </div>

    <div class="card">
      <div class="card-hd">
        <div class="card-ico amber">💼</div>
        <div class="card-ttl">이사장님이 알아야 할 실무 포인트</div>
      </div>
      <div class="points">${pts}</div>
    </div>

    <button class="btn-share" onclick="shareCase()">
      <span>💬</span> 나한테 보내기
    </button>
    <button class="btn-more" onclick="loadCase(true)">🔄 다른 판례 보기</button>
  `;
}

function renderCase(d, fromCache) {
  document.getElementById('caseContent').innerHTML = buildCaseHTML(d);
  document.getElementById('cacheBar').style.display = fromCache ? 'flex' : 'none';
  show('today');
}

/* ═══ 공유 ═══ */
function shareCase() {
  if (!currentCase) return;
  const d = currentCase;
  const text =
    `[MG 판례 브리핑] ${d._label || ''}\n\n` +
    `⚖️ ${d.title}\n🏛 ${d.court} | ${d.date}\n\n` +
    `💬 쉽게 말하면?\n${d.easy_summary}\n\n` +
    `📖 사건 개요\n${(d.summary_bullets||[]).map(b=>'▶ '+b).join('\n')}\n\n` +
    `⚖️ 판결 결과\n${d.verdict}\n\n` +
    `💼 실무 포인트\n${(d.points||[]).map((p,i)=>`${i+1}. ${p}`).join('\n')}`;

  if (navigator.share) {
    navigator.share({ title: `[MG 판례] ${d.title}`, text })
      .then(() => toast('공유 완료! 카카오톡 → 나에게 보내기 선택 📩'))
      .catch(e => { if (e.name !== 'AbortError') copyText(text); });
  } else {
    copyText(text);
  }
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(() => toast('📋 복사됐습니다! 카카오톡에 붙여넣기 하세요.'))
      .catch(() => toast('복사 실패. 다시 시도해 주세요.'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('📋 복사됐습니다! 카카오톡에 붙여넣기 하세요.');
  }
}

/* ═══ 히스토리 ═══ */
function saveHist(d) {
  try {
    let h = JSON.parse(localStorage.getItem('mg_hist') || '[]');
    h = h.filter(x => x.key !== d._date);
    h.unshift({ key: d._date, label: d._label, title: d.title, cat: d.category });
    if (h.length > 60) h = h.slice(0, 60);
    localStorage.setItem('mg_hist', JSON.stringify(h));
  } catch(e) {}
}

function renderHistList() {
  document.getElementById('histDetail').style.display = 'none';
  document.getElementById('histList').style.display   = 'block';
  let h = [];
  try { h = JSON.parse(localStorage.getItem('mg_hist') || '[]'); } catch(e) {}

  if (!h.length) {
    document.getElementById('histItems').innerHTML = `
      <div class="hist-empty">
        <div class="hist-empty-ico">📭</div>
        <div class="hist-empty-msg">아직 저장된 판례가 없습니다.<br>오늘 판례를 먼저 불러오세요.</div>
      </div>`;
    document.getElementById('histCount').textContent = '';
    return;
  }

  document.getElementById('histCount').textContent = `총 ${h.length}건 저장됨`;
  document.getElementById('histItems').innerHTML = h.map(x => `
    <div class="hist-item" onclick="openDetail('${x.key}')">
      <div class="hist-ico">⚖️</div>
      <div class="hist-info">
        <div class="hist-date">${x.label || x.key}</div>
        <div class="hist-name">${x.title || '판례'}</div>
      </div>
      ${x.key === TODAY_KEY
        ? '<span class="hist-today">오늘</span>'
        : `<span class="hist-cat">${x.cat || ''}</span>`}
    </div>`).join('');
}

function openDetail(key) {
  try {
    const raw = localStorage.getItem('mg_' + key);
    if (!raw) { toast('데이터를 찾을 수 없습니다.'); return; }
    const d = JSON.parse(raw);
    const tmp = currentCase;
    currentCase = d;
    document.getElementById('histDetailContent').innerHTML = buildCaseHTML(d);
    currentCase = tmp;
    document.getElementById('histDetail').style.display = 'block';
    document.getElementById('histList').style.display   = 'none';
    window.scrollTo(0, 0);
  } catch(e) { toast('불러오기 실패'); }
}

function closeDetail() {
  document.getElementById('histDetail').style.display = 'none';
  document.getElementById('histList').style.display   = 'block';
}

/* ═══ 토스트 ═══ */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ═══ 시작 ═══ */
loadCase(false);
</script>
</body>
</html>
